---
# Emergency use only: wipes /etc/letsencrypt to recover from corrupted
# cert state. To add a new domain, edit `letsencrypt_cert_domains` and
# run `site.yml --tags tls --limit <host>` instead.
- hosts: tls
  become: true
  tasks:
    - name: stop nginx
      shell: systemctl stop nginx
    - name: remove old certs
      shell: rm -rf /etc/letsencrypt
